# MVP funcional - um único comando sobe tudo (MySQL + backend + frontend):
#
#   docker compose up --build
#
# Backend:  http://localhost:8080
# Frontend: http://localhost:5173
#
# O MySQL roda DENTRO do Docker (serviço "db" abaixo), não precisa instalar
# nada na sua máquina. O schema (db/schema.sql) é aplicado automaticamente
# na primeira vez que o container do banco sobe.
#
# ATENÇÃO: se você já tem um MySQL instalado direto no seu sistema e rodando
# na porta 3306, vai dar conflito de porta ("port is already allocated").
# Pare o serviço local antes de subir este projeto:
#   sudo systemctl stop mysql       (Linux/systemd)
#   sudo systemctl disable mysql    (opcional, pra não voltar a subir sozinho no boot)

services:
  db:
    image: mysql:8.0
    container_name: roleta-russa-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-NovaSenhaForte123!}
      MYSQL_ROOT_HOST: "%" # permite conexão do root vindo de qualquer host (outros
                            # containers, e da sua máquina via localhost:3306)
      MYSQL_DATABASE: roleta_russa
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-NovaSenhaForte123!}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./roleta-russa-backend
      dockerfile: Dockerfile
    container_name: roleta-russa-backend
    ports:
      - "8080:8080"
    environment:
      # "db" = nome do serviço acima, resolvível pela rede interna do Docker
      # Compose (backend e db estão no mesmo compose, então já enxergam um
      # ao outro por nome de serviço).
      DB_URL: jdbc:mysql://db:3306/roleta_russa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-NovaSenhaForte123!}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./roleta-russa-frontend
      dockerfile: Dockerfile.dev # Dockerfile.dev = modo desenvolvimento (vite dev server com hot-reload)
    container_name: roleta-russa-frontend
    ports:
      - "5173:5173"
    environment:
      # IMPORTANTE: esta URL é usada pelo NAVEGADOR (não pelo container do frontend),
      # já que quem executa o JS e faz as chamadas de API é o browser da sua máquina.
      # Por isso é "localhost:8080" e NÃO "backend:8080" (nome só resolvível
      # dentro da rede interna do Docker, que o navegador não enxerga).
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  db_data:
